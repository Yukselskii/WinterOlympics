<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login — Winter Olympics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .login-box { max-width: 400px; margin: 4rem auto; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <div class="login-box card">
        <h2 style="text-align:center;">Login</h2>
        <div th:if="${param.error}" class="alert alert-error">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
        <p style="text-align:center;margin-top:1rem;">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </p>
    </div>
</div>
</body>
</html>
