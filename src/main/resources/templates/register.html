<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register — Winter Olympics</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>.reg-box { max-width: 500px; margin: 3rem auto; }</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <div class="reg-box card">
        <h2>Athlete Registration</h2>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <form th:action="@{/register}" method="post">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required minlength="3"/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="6"/>
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required/>
            </div>
            <div class="form-group">
                <label>Country (e.g., USA, NOR)</label>
                <input type="text" name="country" required/>
            </div>
            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">-- Select --</option>
                    <option value="MALE">Male</option>
                    <option value="FEMALE">Female</option>
                </select>
            </div>
            <div class="form-group">
                <label>Birth Date</label>
                <input type="date" name="birthDate" required/>
            </div>
            <button type="submit" class="btn btn-success" style="width:100%;">Register</button>
        </form>
        <p style="text-align:center;margin-top:1rem;">
            Already have an account? <a th:href="@{/login}">Login</a>
        </p>
    </div>
</div>
</body>
</html>
