<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Manage Athletes — Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <h1>Manage Athletes</h1>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <table>
        <thead>
        <tr><th>#</th><th>Name</th><th>Country</th><th>Gender</th><th>Birth Date</th><th>Age</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="a, stat : ${athletes}">
            <td th:text="${stat.index + 1}"></td>
            <td th:text="${a.name}"></td>
            <td th:text="${a.country}"></td>
            <td><span class="badge"
                      th:classappend="${a.gender.name() == 'MALE' ? 'badge-male' : 'badge-female'}"
                      th:text="${a.gender}"></span></td>
            <td th:text="${a.birthDate}"></td>
            <td th:text="${a.age}"></td>
            <td>
                <a th:href="@{/athletes/{id}(id=${a.id})}" class="btn btn-primary btn-sm">View</a>
                <a th:href="@{/admin/athletes/{id}/edit(id=${a.id})}" class="btn btn-warning btn-sm">Edit</a>
                <form th:action="@{/admin/athletes/{id}/delete(id=${a.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('Delete this athlete? This cannot be undone.');">
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<footer>Winter Olympics Management System</footer>
</body>
</html>
