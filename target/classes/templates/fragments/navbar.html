<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar">
    <a class="brand" th:href="@{/}">❄ Winter <span>Olympics</span></a>
    <ul>
        <li><a th:href="@{/competitions}">Competitions</a></li>
        <li><a th:href="@{/athletes}">Athletes</a></li>
        <li><a th:href="@{/medals}">Medal Table</a></li>
        <li><a th:href="@{/statistics}">Statistics</a></li>
        <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/competitions/new}">+ New Competition</a></li>
        <li sec:authorize="isAuthenticated()"><a th:href="@{/dashboard}">Dashboard</a></li>
        <li sec:authorize="isAuthenticated()"><a th:href="@{/profile}">Profile</a></li>
        <li sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-sm" style="background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.4);">Logout</button>
            </form>
        </li>
        <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}">Login</a></li>
        <li sec:authorize="!isAuthenticated()"><a th:href="@{/register}">Register</a></li>
    </ul>
</nav>
</body>
</html>
